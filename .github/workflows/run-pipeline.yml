name: Run Pipeline

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore AI cache
        uses: actions/cache@v4.2.0
        with:
          path: |
            data/classification_cache.json
            data/rewrite_cache.json
          key: pipeline-ai-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pipeline-ai-cache-${{ runner.os }}-

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.main --skip-indexing

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: pipeline-output-${{ github.run_id }}
          path: output/
          retention-days: 7

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3.12.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "PMJ Pipeline failed"
          to: turleygrayson@gmail.com
          from: PMJ Pipeline <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The daily pipeline run failed.

            View the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Commit state and feed changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json output/feed.xml
          if [ -f NOTICE.txt ]; then
            git add NOTICE.txt
          else
            git rm --cached NOTICE.txt 2>/dev/null || true
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push origin main
          fi
